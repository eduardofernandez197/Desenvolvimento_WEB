<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina de Cadastro</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>Crie sua conta </legend>
       
        <div>

            <label for="nome"> Nome:</label>
                <br>
            <input type="text" id="nome" name="name">

        </div>
        
        <div>&nbsp;</div>

        <div>

            <label for="email"> E-mail:</label>
               <br>
            <input type="email" id="email" placeholder="seuemail@dominio.com">

        <div>&nbsp;</div>
        </div>

        <div>
            <label for="Senha">Senha(minimo 8 caracteres):</label>


           <br>

            <input type = "password" id="Senha" name="Senha" minlength="8" maxlength="10">
        </div>
                <div>&nbsp;</div>
            <div>
            <label> Gênero:</label>
           <br>
             <label>
            <input type="radio" name="sexo" > Masculino <br>
            </label>

           <label>
            <label>
           <input type="radio" name="sexo" > Feminino <br>
           </label>

           <label>
           <input type="radio" name="sexo" > Outros <br>
           </label>

        </div>
        
        <div>
            <label for="bio">Biografia:</label>
              <div>&nbsp;</div>
            <textarea id="bio" name="bio" rows="4" cols="40"
            placeholder="me conte um pouco sobre você..."></textarea>
        </div>
        <div>

           
           <input type="checkbox">
            Eu li e aceito os termos de serviço. 
            
            </div>

         </fieldset>
            <br>
         <button> 
            Cadastrar
         </button>

         <button type="reset">
            Limpar
         </button>
    </form>
    <script>fetch()
    </script>
</body>
</html>
